name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Confirm submodule matches the pin
        run: |
          pin="$(grep -oE '`[0-9a-f]{40}`' UPSTREAM.md | head -1 | tr -d '`')"
          have="$(git -C vendor/the-sqisign rev-parse HEAD)"
          test "$pin" = "$have" || {
            echo "::error::vendor/the-sqisign at $have, UPSTREAM.md pins $pin"
            exit 1
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test (workspace, includes the shake256 differential vectors)
        run: cargo test --workspace --all-targets

      - name: Verify-only crate stays signing-free
        # Katzenpost mix nodes pull only the verification path; building the
        # umbrella with default features must not drag in sqisign-sign.
        run: |
          cargo tree -p sqisign --edges normal | tee /tmp/tree.txt
          if grep -q '^.*sqisign-sign' /tmp/tree.txt; then
            echo "::error::sqisign-sign present in default (verify-only) tree"
            exit 1
          fi
