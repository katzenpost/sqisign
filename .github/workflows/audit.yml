name: audit

# cargo-audit fails the build on any matching advisory in the
# RustSec database. Runs on every push and pull request so
# dependency drift cannot land silently, and daily on schedule so
# advisories published against a dependency we are already using
# fire on their own without needing a push.

on:
  push:
  pull_request:
  schedule:
    # 04:17 UTC, an off-peak time picked so the schedule rarely
    # collides with the GitHub runner queue's busy hours.
    - cron: "17 4 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Audit the workspace's locked dependencies
        # --deny warnings escalates RUSTSEC informational notices to
        # failures, which is the bar we want at the SECURITY.md
        # threshold (any known advisory is a release-blocker).
        run: cargo audit --deny warnings
